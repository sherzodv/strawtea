services:
  db:
    image: postgres:16-alpine
    container_name: strawtea-postgres
    environment:
      POSTGRES_DB: strawtea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - strawtea-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d strawtea"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  strawtea-postgres-data:
